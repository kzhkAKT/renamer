<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ファイル名プレビューアー</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <label for="prefix" style="font-weight: bold;">添字入力(prefix):</label>
            <input type="text" id="prefix" placeholder="ここに添字を入力 (例: 2026年度_)">
            
            <div class="options-area">
                <div class="dir-selection">
                    <label style="font-weight: bold; font-size: 14px;">保存先フォルダ (空欄なら元の場所):</label>
                    <div class="dir-input-group">
                        <input type="text" id="dest-dir" readonly placeholder="選択されていません">
                        <button id="select-dir-btn">選択</button>
                        <button id="clear-dir-btn">クリア</button>
                    </div>
                </div>
                <div class="copy-mode-selection">
                    <label style="font-weight: bold; cursor: pointer; font-size: 14px;">
                        <input type="checkbox" id="copy-mode">
                        元のファイルを残す (コピーを作成する)
                    </label>
                </div>
            </div>
        </div>
        
        <div class="list-header">
            <div class="col col-old">drag & drop file</div>
            <div class="col col-new">prefix + file name</div>
        </div>
        
        <div id="drop-zone">
            <div id="file-list"></div>
            <div id="placeholder-text">ここにファイルをドラッグ＆ドロップ</div>
        </div>

        <div class="action-area">
            <button id="execute-btn" style="margin-right: 10px; background-color: #0078d7; color: white; font-weight: bold; border: none; border-radius: 4px; padding: 8px 20px; cursor: pointer;">リネーム実行！</button>
            <button id="quit-btn">アプリを終了</button>
        </div>

    </div>

    <div class="disclaimer">
    このアプリは動作確認のための試作品です
    </div>
    
    <script src="./src/main.js" type="module"></script>
</body>
</html>
